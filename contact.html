<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Emilia Nguyen</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --soft-lilac: #f3efff;
            --accent: #a855f7;
            --deep-purple: #4c1d95;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--deep-purple);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Nav - Consistent across all pages */
        nav {
            width: 100%;
            padding: 1.2rem 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--soft-lilac);
        }

        nav a {
            text-decoration: none;
            color: var(--deep-purple);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--accent); }

        /* Main Section - Split Layout matching Home Page */
        .main-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            border-bottom: 1px solid var(--soft-lilac);
        }

        .image-container {
            background-color: var(--soft-lilac);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .image-container img {
            width: 100%;
            max-width: 500px;
            height: auto;
            object-fit: cover;
            display: block;
            box-shadow: 0 20px 50px rgba(76, 29, 149, 0.15);
        }

        .content-container { 
            padding: 10%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            background-color: #fff;
            border-left: 1px solid var(--soft-lilac);
        }

        .highlight {
            letter-spacing: 6px; 
            font-size: 0.75rem; 
            color: var(--accent); 
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.5rem, 6vw, 4.5rem); 
            text-transform: uppercase; 
            margin: 0;
            color: var(--deep-purple);
            line-height: 1;
            letter-spacing: -2px;
        }

        .description { 
            font-size: 1.1rem; 
            margin: 30px 0 40px; 
            color: var(--deep-purple); 
            line-height: 1.8;
            opacity: 0.9;
        }

        /* Bold Purple Button */
        .action-btn {
            background: var(--deep-purple);
            color: var(--white);
            text-decoration: none;
            padding: 20px 40px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            transition: background 0.3s, transform 0.2s;
            text-align: center;
            align-self: flex-start;
        }

        .action-btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        /* Mobile View */
        @media (max-width: 850px) {
            .main-section {
                grid-template-columns: 1fr;
            }
            .content-container {
                border-left: none;
                border-top: 1px solid var(--soft-lilac);
                text-align: center;
            }
            .action-btn {
                align-self: center;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="photography.html">Photography</a>
        <a href="design.html">Design</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section class="main-section">
        <div class="image-container">
            <img src="emilia.jpg" alt="emilia">
        </div>

        <div class="content-container">
            <span class="highlight">stay in touch!</span>
            <h1>Emilia <br>Nguyen</h1>
            <p class="description">
                Inquiries & Collaborations. For project bookings, image licensing, or design consultations, please use the form below. Serious inquiries only.
            </p>
            <a href="contact.html" class="action-btn">WORK WITH ME</a>
        </div>
    </section>

</body>
</html>
